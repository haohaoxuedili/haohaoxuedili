name: Release Android APK

# 触发条件: 手动触发（可指定版本号）或推送 v 开头的 tag
on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（例如 1.0.3），会创建对应 tag v{version}'
        required: true
        default: '1.0.3'
      release_notes:
        description: 'Release 说明（可选）'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-22.04
    timeout-minutes: 150
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip python3-virtualenv \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev automake autopoint gettext build-essential ccache
          pip3 install --upgrade "buildozer==1.5.0" "Cython==3.0.11" "virtualenv" "sh==2.0.7"
          buildozer version

      - name: Link android-actions SDK to buildozer's expected location
        shell: bash
        run: |
          BUILD_SDK="$HOME/.buildozer/android_sdk"
          REAL_SDK="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          mkdir -p "$HOME/.buildozer"
          if [ -d "$REAL_SDK" ]; then
            if [ ! -e "$BUILD_SDK" ]; then
              ln -s "$REAL_SDK" "$BUILD_SDK"
            fi
          else
            echo "找不到 SDK at $REAL_SDK"
            exit 1
          fi

      - name: Install Android API 33 platform and build-tools
        shell: bash
        run: |
          export ANDROID_HOME="$HOME/.buildozer/android_sdk"
          export ANDROID_SDK_ROOT="$HOME/.buildozer/android_sdk"
          CMDTOOLS="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin"
          if [ ! -d "$CMDTOOLS" ]; then
            CMDTOOLS="$ANDROID_SDK_ROOT/cmdline-tools/16.0/bin"
          fi
          yes | "$CMDTOOLS/sdkmanager" --licenses >/dev/null 2>&1 || true
          "$CMDTOOLS/sdkmanager" "platforms;android-33" "build-tools;33.0.2" "platform-tools"

      - name: Cache Android SDK / NDK / p4a / build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android_ndk
            ~/.buildozer/android_packages
            ~/.buildozer/global_packages
            ~/.buildozer/android/platform
            android/.buildozer
            android/bin
          key: android-release-${{ runner.os }}-${{ hashFiles('android/buildozer.spec') }}-${{ hashFiles('.github/workflows/release-apk.yml') }}
          restore-keys: |
            android-release-${{ runner.os }}-${{ hashFiles('android/buildozer.spec') }}-
            android-release-${{ runner.os }}-

      - name: Sync core module
        run: cp ncm2mp3.py android/ncm2mp3.py

      - name: Convert SVG icon to PNG
        run: |
          sudo apt update
          sudo apt install -y librsvg2-bin
          rsvg-convert -w 512 -h 512 gemini-svg.svg -o android/app.png
          file android/app.png

      - name: Download Android FFmpeg binaries
        run: |
          mkdir -p android/bundled
          mkdir -p android/libs/arm64-v8a
          mkdir -p android/libs/armeabi-v7a
          cd android/bundled
          wget -q https://github.com/Khang-NT/ffmpeg-binary-android/releases/download/2018-07-31/arm64-v8a-lite.tar.bz2 -O arm64.tar.bz2
          mkdir arm64 && tar -xjf arm64.tar.bz2 -C arm64
          find arm64 -name ffmpeg -type f -exec cp {} ffmpeg-arm64.bin \;
          find arm64 -name ffmpeg -type f -exec cp {} ../libs/arm64-v8a/libffmpeg.so \;
          wget -q https://github.com/Khang-NT/ffmpeg-binary-android/releases/download/2018-07-31/armv7-a-lite.tar.bz2 -O armv7.tar.bz2
          mkdir armv7 && tar -xjf armv7.tar.bz2 -C armv7
          find armv7 -name ffmpeg -type f -exec cp {} ffmpeg-armv7.bin \;
          find armv7 -name ffmpeg -type f -exec cp {} ../libs/armeabi-v7a/libffmpeg.so \;
          rm -rf arm64 armv7 *.tar.bz2
          chmod +x ffmpeg-*.bin

      - name: Decode release keystore
        id: keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::未配置 KEYSTORE_BASE64 secret，跳过签名，仅产出 unsigned APK"
            echo "have_keystore=false" >> $GITHUB_OUTPUT
          else
            echo "$KEYSTORE_BASE64" | base64 -d > android/release-key.keystore
            ls -lh android/release-key.keystore
            echo "have_keystore=true" >> $GITHUB_OUTPUT
          fi

      - name: Build release APK (unsigned)
        id: build
        working-directory: android
        continue-on-error: true
        shell: bash
        run: |
          set +e
          export ANDROID_HOME="$HOME/.buildozer/android_sdk"
          export ANDROID_SDK_ROOT="$HOME/.buildozer/android_sdk"
          # 注释掉 buildozer.spec 里的签名配置，生成 unsigned release APK
          # 然后我们用自己的 apksigner 签名，避免 buildozer 签名环节失败导致无产物
          sed -i 's/^android\.keystore\./#&/' buildozer.spec
          echo "--- buildozer.spec 签名相关（应已注释） ---"
          grep -nE 'keystore|debug' buildozer.spec || true
          yes | buildozer -v android release 2>&1 | tee buildozer-release.log
          ec=${PIPESTATUS[1]}
          echo "BUILD_EXIT_CODE=$ec" >> $GITHUB_ENV
          echo "buildozer exit code: $ec"
          echo "--- bin 目录树 ---"
          find bin -maxdepth 3 -type f 2>/dev/null | head -50 || echo "(bin 不存在或为空)"
          echo "--- .buildozer/android/platform 下的 apk ---"
          find .buildozer/android/platform -name "*.apk" -type f 2>/dev/null | head -20 || true
          rm -rf apk-output
          mkdir -p apk-output
          # 从所有可能的位置收集 APK
          find . -name "*-release*.apk" -o -name "*.apk" 2>/dev/null | while read f; do
            echo "found apk: $f"
            cp "$f" apk-output/
          done
          ls -lh apk-output/ 2>/dev/null || true
          exit 0

      - name: Dump buildozer release log tail
        if: always()
        working-directory: android
        shell: bash
        run: |
          echo "=============== buildozer-release.log (末尾 200 行) ==============="
          tail -n 200 buildozer-release.log || echo "(无日志文件)"
          echo "=============== 错误上下文 ==============="
          grep -nEi "error|failed|exception|not found|traceback|cannot|no such file|warning" buildozer-release.log | tail -40 || true
          echo "=============== 结束 ==============="

      - name: Sign APK with apksigner
        if: success() && steps.keystore.outputs.have_keystore == 'true'
        working-directory: android
        shell: bash
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          BUILD_TOOLS="$HOME/.buildozer/android_sdk/build-tools/33.0.2"
          if [ ! -d "$BUILD_TOOLS" ]; then
            BUILD_TOOLS=$(ls -d $HOME/.buildozer/android_sdk/build-tools/*/ | tail -1)
          fi
          echo "apksigner located at: $BUILD_TOOLS/apksigner"
          cd apk-output
          for apk in *.apk; do
            [ -e "$apk" ] || continue
            echo "--- zipalign $apk ---"
            "$BUILD_TOOLS/zipalign" -f -v 4 "$apk" "${apk%.apk}-aligned.apk" || cp "$apk" "${apk%.apk}-aligned.apk"
            echo "--- apksigner sign $apk ---"
            "$BUILD_TOOLS/apksigner" sign \
              --ks ../release-key.keystore \
              --ks-key-alias "$KEY_ALIAS" \
              --ks-pass "pass:$KEYSTORE_PASSWORD" \
              --key-pass "pass:$KEY_PASSWORD" \
              --out "${apk%.apk}-signed.apk" \
              "${apk%.apk}-aligned.apk"
            "$BUILD_TOOLS/apksigner" verify --verbose "${apk%.apk}-signed.apk" || true
          done
          # 仅保留签名后的 APK
          rm -f *-aligned.apk
          ls -lh

      - name: Verify APK exists
        shell: bash
        run: |
          echo "BUILD_EXIT_CODE=${BUILD_EXIT_CODE}"
          if ls android/apk-output/*.apk >/dev/null 2>&1; then
            echo "BUILD OK: APK found"
            ls -lh android/apk-output/
          else
            echo "BUILD FAILED: no APK found, exit_code=${BUILD_EXIT_CODE}"
            echo "请下载 buildozer-release-log artifact 查看完整构建日志。"
            exit 1
          fi

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ncm2mp3-release-apk
          path: android/apk-output/*.apk
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload buildozer release log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-release-log
          path: android/buildozer-release.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Rename APK for release
        if: success()
        working-directory: android/apk-output
        shell: bash
        run: |
          # 找到最终签名的 APK，重命名为规范名称
          APK=$(ls *-signed.apk 2>/dev/null | head -1 || ls *.apk | head -1)
          mv "$APK" "ncm2mp3-${{ github.ref_name }}-release.apk" || true
          ls -lh

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v${{ github.event.inputs.version }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_tag=$TAG"

      - name: Create GitHub Release
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          NOTES="${{ github.event.inputs.release_notes }}"
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}

          NCM 转 MP3 / FLAC 安卓安装包。

          ## 安装说明
          1. 下载 APK 文件到手机
          2. 允许\"来自未知来源\"的安装
          3. 点击安装，首次安装需授予存储访问权限

          支持架构：arm64-v8a, armeabi-v7a"
          fi
          cd android/apk-output
          gh release create "$TAG" \
            --target "${{ github.sha }}" \
            --title "NCM 转 MP3 / FLAC ${TAG}" \
            --notes "$NOTES" \
            *.apk
