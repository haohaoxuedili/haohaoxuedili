name: Build Android APK

# 触发条件: 手动触发 或 推送到主分支
on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip python3-virtualenv \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev automake autopoint gettext build-essential ccache
          # 固定 buildozer / p4a / Cython 版本以保证可重复构建
          pip3 install --upgrade "buildozer==1.5.0" "Cython==3.0.11" "virtualenv" "sh==2.0.7"
          buildozer version

      - name: Pre-install Android SDK cmdline-tools and accept all licenses
        run: |
          # buildozer 期望 cmdline-tools 存在; 这里先装好再预接受 license, 避免 buildozer 自动接受时卡在交互式 prompt
          set -e
          SDK_ROOT="$HOME/.buildozer/android_sdk"
          mkdir -p "$SDK_ROOT/cmdline-tools"
          cd "$SDK_ROOT/cmdline-tools"
          echo "下载 Android cmdline-tools 11.0..."
          wget -q -O cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q cmdline-tools.zip
          # 标准命名让 sdkmanager 可被 buildozer 识别
          mv cmdline-tools latest
          rm cmdline-tools.zip
          export ANDROID_SDK_ROOT="$SDK_ROOT"
          export ANDROID_HOME="$SDK_ROOT"
          export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          echo "预接受所有 SDK 许可..."
          yes | sdkmanager --licenses > /tmp/licenses.log 2>&1 || true
          echo "--- license 接受结果 ---"
          tail -n 20 /tmp/licenses.log
          # 写入 licenses 目录确认
          echo "--- licenses 目录 ---"
          ls -la "$SDK_ROOT/licenses" || echo "(无 licenses 目录, 失败)"
          # 装满足 buildozer 1.5 默认 build-tools 版本 33.0.2
          sdkmanager --install "platforms;android-33" "build-tools;33.0.2" "platform-tools"
          echo "--- SDK 目录结构(前3层) ---"
          find "$SDK_ROOT" -maxdepth 3 -type d

      - name: Cache Android SDK / NDK / p4a
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android_sdk
            ~/.buildozer/android_ndk
            ~/.buildozer/android_packages
            ~/.buildozer/global_packages
            android/.buildozer
          key: android-sdk-25b-${{ runner.os }}-${{ hashFiles('android/buildozer.spec') }}
          restore-keys: android-sdk-25b-${{ runner.os }}-

      - name: Sync core module
        run: |
          cp ncm2mp3.py android/ncm2mp3.py

      - name: Pre-check (test buildozer can read spec)
        working-directory: android
        run: |
          echo "--- buildozer.spec ---"
          cat buildozer.spec
          echo "--- 工作目录 ---"
          pwd
          ls -la
          echo "--- buildozer distcheck ---"
          buildozer android clean || true

      - name: Build debug APK
        id: build
        working-directory: android
        continue-on-error: true
        shell: bash
        run: |
          # 不使用 pipefail
          set +e
          export ANDROID_HOME="$HOME/.buildozer/android_sdk"
          export ANDROID_SDK_ROOT="$HOME/.buildozer/android_sdk"
          # 用 yes 持续喂 y 给 buildozer 调 sdkmanager 时弹的 license prompt
          yes | buildozer -v android debug 2>&1 | tee buildozer.log
          ec=${PIPESTATUS[0]}
          echo "BUILD_EXIT_CODE=$ec" >> $GITHUB_ENV
          echo "buildozer 退出码: $ec"
          exit 0

      - name: Dump buildozer log tail (visible in Actions web UI)
        if: always()
        working-directory: android
        shell: bash
        run: |
          echo "=============== buildozer.log 内容 (前100行) ==============="
          head -n 100 buildozer.log || echo "(无日志文件)"
          echo "=============== buildozer.log 内容 (末尾100行) ==============="
          tail -n 100 buildozer.log || echo "(无日志文件)"
          echo "=============== 结束 ==============="

      - name: Show build result
        shell: bash
        run: |
          echo "BUILD_EXIT_CODE=${BUILD_EXIT_CODE}"
          if [ "${BUILD_EXIT_CODE}" = "0" ]; then
            echo "BUILD OK"
          else
            echo "BUILD FAILED, exit_code=${BUILD_EXIT_CODE}"
            exit 1
          fi

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ncm2mp3-apk
          path: android/bin/*.apk
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload buildozer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: android/buildozer.log
          retention-days: 7
          if-no-files-found: ignore
