name: Build Android APK

# 触发条件: 手动触发 或 推送到主分支
on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK (with all licenses auto-accepted)
        uses: android-actions/setup-android@v3

      - name: Install buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip python3-virtualenv \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev automake autopoint gettext build-essential ccache
          # 固定 buildozer / p4a / Cython 版本以保证可重复构建
          pip3 install --upgrade "buildozer==1.5.0" "Cython==3.0.11" "virtualenv" "sh==2.0.7"
          buildozer version

      - name: Link android-actions SDK to buildozer's expected location
        shell: bash
        run: |
          # android-actions 把 SDK 装到 $ANDROID_SDK_ROOT, 默认是 /usr/local/lib/android/sdk
          # buildozer 期望在 $HOME/.buildozer/android_sdk, 这里做软链接避免重复下载
          BUILD_SDK="$HOME/.buildozer/android_sdk"
          REAL_SDK="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          mkdir -p "$HOME/.buildozer"
          if [ -d "$REAL_SDK" ]; then
            echo "SDK 真实位置: $REAL_SDK"
            ls -la "$REAL_SDK" | head -10
            # 不覆盖已存在的
            if [ ! -e "$BUILD_SDK" ]; then
              ln -s "$REAL_SDK" "$BUILD_SDK"
              echo "已建立软链接 $BUILD_SDK -> $REAL_SDK"
            fi
            ls -la "$BUILD_SDK"
          else
            echo "找不到 SDK at $REAL_SDK"
            exit 1
          fi

      - name: Install Android API 33 platform
        shell: bash
        run: |
          export ANDROID_HOME="$HOME/.buildozer/android_sdk"
          export ANDROID_SDK_ROOT="$HOME/.buildozer/android_sdk"
          CMDTOOLS="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin"
          if [ ! -d "$CMDTOOLS" ]; then
            CMDTOOLS="$ANDROID_SDK_ROOT/cmdline-tools/16.0/bin"
          fi
          echo "sdkmanager: $CMDTOOLS/sdkmanager"
          yes | "$CMDTOOLS/sdkmanager" --licenses >/dev/null 2>&1 || true
          "$CMDTOOLS/sdkmanager" "platforms;android-33" "build-tools;33.0.2" "platform-tools"

      - name: Cache Android SDK / NDK / p4a / build outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android_ndk
            ~/.buildozer/android_packages
            ~/.buildozer/global_packages
            ~/.buildozer/android/platform
            android/.buildozer
            android/bin
          key: android-build-${{ runner.os }}-${{ hashFiles('android/buildozer.spec') }}-${{ hashFiles('.github/workflows/build-apk.yml') }}
          restore-keys: |
            android-build-${{ runner.os }}-${{ hashFiles('android/buildozer.spec') }}-
            android-build-${{ runner.os }}-

      - name: Sync core module
        run: |
          cp ncm2mp3.py android/ncm2mp3.py

      - name: Convert SVG icon to PNG
        run: |
          sudo apt update
          sudo apt install -y librsvg2-bin
          rsvg-convert -w 512 -h 512 gemini-svg.svg -o android/app.png
          file android/app.png

      - name: Download Android FFmpeg binaries
        run: |
          # 同时打包成 native lib (.so) 和普通资源，运行时优先从 nativeLibraryDir 加载
          mkdir -p android/bundled
          mkdir -p android/libs/arm64-v8a
          mkdir -p android/libs/armeabi-v7a
          cd android/bundled
          # arm64-v8a
          wget -q https://github.com/Khang-NT/ffmpeg-binary-android/releases/download/2018-07-31/arm64-v8a-lite.tar.bz2 -O arm64.tar.bz2
          mkdir arm64 && tar -xjf arm64.tar.bz2 -C arm64
          find arm64 -name ffmpeg -type f -exec cp {} ffmpeg-arm64.bin \;
          find arm64 -name ffmpeg -type f -exec cp {} ../libs/arm64-v8a/libffmpeg.so \;
          # armeabi-v7a
          wget -q https://github.com/Khang-NT/ffmpeg-binary-android/releases/download/2018-07-31/armv7-a-lite.tar.bz2 -O armv7.tar.bz2
          mkdir armv7 && tar -xjf armv7.tar.bz2 -C armv7
          find armv7 -name ffmpeg -type f -exec cp {} ffmpeg-armv7.bin \;
          find armv7 -name ffmpeg -type f -exec cp {} ../libs/armeabi-v7a/libffmpeg.so \;
          rm -rf arm64 armv7 *.tar.bz2
          chmod +x ffmpeg-*.bin
          echo "--- FFmpeg binaries ---"
          ls -lh
          file ffmpeg-*.bin || true
          echo "--- FFmpeg native libs ---"
          ls -lh ../libs/arm64-v8a ../libs/armeabi-v7a || true

      - name: Pre-check (test buildozer can read spec)
        working-directory: android
        run: |
          echo "--- buildozer.spec ---"
          cat buildozer.spec
          echo "--- 工作目录 ---"
          pwd
          ls -la
          echo "--- env ---"
          env | grep -i android || true
          echo "--- SDK 查找测试 ---"
          test -d "$HOME/.buildozer/android_sdk/cmdline-tools/latest/bin" && echo "cmdline-tools OK"
          test -d "$HOME/.buildozer/android_sdk/build-tools" && echo "build-tools OK"
          ls -la "$HOME/.buildozer/android_sdk/licenses" || echo "无 licenses 目录"

      - name: Build debug APK
        id: build
        working-directory: android
        continue-on-error: true
        shell: bash
        run: |
          set +e
          export ANDROID_HOME="$HOME/.buildozer/android_sdk"
          export ANDROID_SDK_ROOT="$HOME/.buildozer/android_sdk"
          # Keep feeding 'y' for any sdkmanager license prompt buildozer may spawn.
          yes | buildozer -v android debug 2>&1 | tee buildozer.log
          ec=${PIPESTATUS[1]}
          echo "BUILD_EXIT_CODE=$ec" >> $GITHUB_ENV
          echo "buildozer exit code: $ec"
          rm -rf apk-output
          mkdir -p apk-output
          find bin -maxdepth 2 -name "*.apk" -type f -print -exec cp {} apk-output/ \;
          ls -lh apk-output/*.apk 2>/dev/null || true
          exit 0

      - name: Dump buildozer log tail (visible in Actions web UI)
        if: always()
        working-directory: android
        shell: bash
        run: |
          echo "=============== buildozer.log (末尾80行) ==============="
          tail -n 80 buildozer.log || echo "(无日志文件)"
          echo "=============== 错误上下文 ==============="
          grep -nEi "error|failed|exception|not found|traceback|cannot|no such file" buildozer.log | tail -20 || true
          echo "=============== 结束 ==============="

      - name: Show build result
        shell: bash
        run: |
          echo "BUILD_EXIT_CODE=${BUILD_EXIT_CODE}"
          if ls android/apk-output/*.apk >/dev/null 2>&1; then
            echo "BUILD OK: APK found"
          else
            echo "BUILD FAILED: no APK found, exit_code=${BUILD_EXIT_CODE}"
            exit 1
          fi

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ncm2mp3-apk
          path: android/apk-output/*.apk
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload buildozer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: android/buildozer.log
          retention-days: 7
          if-no-files-found: ignore
