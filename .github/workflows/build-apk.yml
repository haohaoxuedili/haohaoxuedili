name: Build Android APK

# 触发条件: 手动触发 或 推送到主分支
on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync core module
        # 确保根目录的最新 ncm2mp3.py 拷到 android/ 子目录
        run: |
          cp ncm2mp3.py android/ncm2mp3.py

      - name: Build debug APK
        id: build
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          command: android debug
          workdir: android
          repository_root: .
        continue-on-error: true

      - name: Dump buildozer log (visible in Actions web UI)
        if: always()
        working-directory: android
        run: |
          # buildozer-action 会把日志输出到 stderr, 这里我们读 buildozer 自动产生的日志
          for f in buildozer.log .buildozer/buildozer.log; do
            if [ -f "$f" ]; then
              echo "=========== $f BEGIN ==========="
              cat "$f"
              echo "=========== $f END ==========="
            fi
          done

      - name: Show build result
        run: |
          if [ "${{ steps.build.outcome }}" = "success" ]; then
            echo "BUILD OK"
          else
            echo "BUILD FAILED, outcome=${{ steps.build.outcome }}"
            exit 1
          fi

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ncm2mp3-apk
          path: android/bin/*.apk
          retention-days: 30

      - name: Upload buildozer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: |
            android/buildozer.log
            android/.buildozer/**/*.log
            android/.buildozer/buildozer.log
          retention-days: 7
          if-no-files-found: ignore
