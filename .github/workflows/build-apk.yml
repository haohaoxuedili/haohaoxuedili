name: Build Android APK

# 触发条件: 手动触发 或 推送到主分支 / 打 tag
on:
  workflow_dispatch:     # GitHub 网页上手动点 "Run workflow"
  push:
    branches: [main, master]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential ccache
          pip3 install --upgrade buildozer Cython==0.29.36 virtualenv

      - name: Cache Android SDK / NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android_sdk
            ~/.buildozer/android_ndk
            ~/.buildozer/global_packages
            android/.buildozer
          key: android-sdk-25b-${{ runner.os }}-${{ hashFiles('android/buildozer.spec') }}
          restore-keys: android-sdk-25b-${{ runner.os }}-

      - name: Sync core module
        # 确保根目录的最新 ncm2mp3.py 拷到 android/ 子目录
        run: |
          cp ncm2mp3.py android/ncm2mp3.py

      - name: Build debug APK
        working-directory: android
        run: |
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ncm2mp3-apk
          path: android/bin/*.apk
          retention-days: 30
          if-no-files-found: error
